# RAG Engine Configuration

corpus:
  name: "indian_supreme_court"
  source: "s3://indian-supreme-court-judgments"  # AWS Open Data, CC-BY-4.0
  years: [2020, 2021, 2022, 2023, 2024]
  raw_dir: "data/raw"
  processed_dir: "data/processed"

chunking:
  strategy: "fixed"  # fixed | sentence | semantic | recursive
  fixed:
    chunk_size: 512
    overlap: 64
  sentence:
    max_sentences: 5
  semantic:
    similarity_threshold: 0.85
    embedding_model: "BAAI/bge-small-en-v1.5"
  recursive:
    chunk_size: 512
    separators: ["\n\n", "\n", ". ", " "]

embedding:
  model: "BAAI/bge-large-en-v1.5"
  batch_size: 64
  dimension: 1024

retrieval:
  top_k: 20
  dense_weight: 0.6
  sparse_weight: 0.4
  fusion_method: "rrf"  # rrf | linear

reranker:
  enabled: true
  model: "BAAI/bge-reranker-v2-m3"
  top_k: 5

generation:
  provider: "ollama"  # ollama | anthropic | openai
  model: "llama3.1"   # ollama: llama3.1, mistral | anthropic: claude-sonnet-4-20250514 | openai: gpt-4o
  max_tokens: 1024
  temperature: 0.1
  base_url: "http://localhost:11434"  # only used for ollama

evaluation:
  benchmark_path: "data/benchmark"
  retrieval_k_values: [1, 3, 5, 10, 20]
  llm_judge_model: "claude-sonnet-4-20250514"
